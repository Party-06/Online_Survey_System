<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Add a question to a survey topic." />
  <title>Add Question — SurveyPulse Admin</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-text">📋 SurveyPulse</div>
      <div class="logo-sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <a href="home.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="addtopic.html"><span class="nav-icon">➕</span> Add Topic</a>
      <a href="../index.html" target="_blank"><span class="nav-icon">📋</span> View Survey</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="avatarLetter">A</div>
        <div>
          <div class="uname" id="sessionUname">admin</div>
          <div class="text-muted" style="font-size:0.72rem;">Administrator</div>
        </div>
      </div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;" onclick="doLogout()">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="page-header">
      <h1>Add Question</h1>
      <p id="topicLabel" class="text-muted">Loading topic…</p>
    </div>

    <div class="card" style="max-width:600px;">
      <div id="alert" class="alert"></div>

      <form id="addForm" onsubmit="addQuestion(event)">

        <div class="form-group">
          <label class="form-label" for="qtext">Question Text</label>
          <input id="qtext" class="form-control" type="text"
                 placeholder="e.g. What is your preferred programming language?"
                 maxlength="250" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="opt1">Option 1</label>
          <input id="opt1" class="form-control" type="text" placeholder="First option" maxlength="100" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="opt2">Option 2</label>
          <input id="opt2" class="form-control" type="text" placeholder="Second option" maxlength="100" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="opt3">Option 3</label>
          <input id="opt3" class="form-control" type="text" placeholder="Third option" maxlength="100" required />
        </div>

        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="submit" class="btn btn-primary">✓ Add Question</button>
          <a id="backLink" href="home.html" class="btn btn-ghost">← Back to Topics</a>
        </div>
      </form>
    </div>

    <!-- Existing questions for this topic -->
    <div class="card" style="max-width:600px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:16px;">Existing Questions</h3>
      <div id="existingList"></div>
    </div>
  </main>
</div>

<script>
  const session = DB.getSession();
  if (session) {
    document.getElementById('sessionUname').textContent = session.uname;
    document.getElementById('avatarLetter').textContent = session.uname[0].toUpperCase();
  }

  const params  = new URLSearchParams(window.location.search);
  const topicId = params.get('topicid');
  if (!topicId) window.location.replace('home.html');

  const topic = DB.getTopics().find(t => t.id === topicId);
  document.getElementById('topicLabel').textContent =
    topic ? `📌 Topic: ${topic.title}` : 'Unknown topic';
  document.getElementById('backLink').href = `topicquestions.html?topicid=${topicId}`;

  function renderExisting() {
    const qs = DB.getQuestions(topicId);
    const el = document.getElementById('existingList');
    if (qs.length === 0) {
      el.innerHTML = '<p class="text-muted">No questions yet.</p>';
      return;
    }
    el.innerHTML = qs.map((q, i) => `
      <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
        <span class="badge badge-purple">${i + 1}</span>
        <div style="flex:1;">
          <div style="font-size:0.9rem;font-weight:600;margin-bottom:4px;">${escHtml(q.text)}</div>
          <div class="text-muted" style="font-size:0.78rem;">${escHtml(q.opt1)} &nbsp;·&nbsp; ${escHtml(q.opt2)} &nbsp;·&nbsp; ${escHtml(q.opt3)}</div>
        </div>
      </div>`).join('');
  }

  function doLogout() {
    DB.logout();
    window.location.replace('login.html');
  }

  function addQuestion(e) {
    e.preventDefault();
    const text = document.getElementById('qtext').value.trim();
    const opt1 = document.getElementById('opt1').value.trim();
    const opt2 = document.getElementById('opt2').value.trim();
    const opt3 = document.getElementById('opt3').value.trim();
    const alertEl = document.getElementById('alert');

    if (!text || !opt1 || !opt2 || !opt3) {
      alertEl.textContent = '⚠️ All fields are required.';
      alertEl.className = 'alert alert-error show';
      return;
    }

    DB.addQuestion(topicId, text, opt1, opt2, opt3);
    alertEl.textContent = '✅ Question added successfully!';
    alertEl.className = 'alert alert-success show';
    ['qtext','opt1','opt2','opt3'].forEach(id => document.getElementById(id).value = '');
    renderExisting();
    setTimeout(() => { alertEl.className = 'alert'; }, 3000);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  renderExisting();
</script>
</body>
</html>
