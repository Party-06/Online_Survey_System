<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View survey results with percentage breakdowns for each question." />
  <title>Survey Results — SurveyPulse Admin</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-text">📋 SurveyPulse</div>
      <div class="logo-sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <a href="home.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="addtopic.html"><span class="nav-icon">➕</span> Add Topic</a>
      <a href="../index.html" target="_blank"><span class="nav-icon">📋</span> View Survey</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="avatarLetter">A</div>
        <div>
          <div class="uname" id="sessionUname">admin</div>
          <div class="text-muted" style="font-size:0.72rem;">Administrator</div>
        </div>
      </div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;" onclick="doLogout()">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <h1>Survey Results</h1>
        <p id="topicLabel" class="text-muted">Loading…</p>
      </div>
      <a href="home.html" class="btn btn-ghost">← Back</a>
    </div>

    <!-- Survey Count Banner -->
    <div id="countBanner" class="card" style="background:var(--bg3);margin-bottom:24px;padding:20px 24px;"></div>

    <!-- Results -->
    <div id="resultsContainer"></div>
  </main>
</div>

<script>
  const session = DB.getSession();
  if (session) {
    document.getElementById('sessionUname').textContent = session.uname;
    document.getElementById('avatarLetter').textContent = session.uname[0].toUpperCase();
  }

  const params  = new URLSearchParams(window.location.search);
  const topicId = params.get('topicid');
  if (!topicId) window.location.replace('home.html');

  const topic = DB.getTopics().find(t => t.id === topicId);
  document.getElementById('topicLabel').textContent = topic ? `📌 ${topic.title}` : 'Unknown topic';

  function doLogout() {
    DB.logout();
    window.location.replace('login.html');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    const count   = DB.getSurveyCount(topicId);
    const results = DB.getSurveyResults(topicId);

    // Banner
    document.getElementById('countBanner').innerHTML = `
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
        <div>
          <div style="font-size:2rem;font-weight:800;background:var(--primary-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${count}</div>
          <div class="text-muted" style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em;">Total Surveys Submitted</div>
        </div>
        <div style="color:var(--text-muted);font-size:0.88rem;">
          ${count === 0
            ? '⚠️ No survey responses recorded yet. Share the survey link to collect data.'
            : `📊 Showing aggregated results across all ${count} response${count !== 1 ? 's' : ''}.`}
        </div>
      </div>`;

    const container = document.getElementById('resultsContainer');

    if (results.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <h3>No Questions</h3>
          <p>This topic has no questions. Add some questions first.</p>
        </div>`;
      return;
    }

    container.innerHTML = results.map((r, i) => {
      const bars = [
        { label: r.option1, pct: r.opt1count, cls: 'opt1' },
        { label: r.option2, pct: r.opt2count, cls: 'opt2' },
        { label: r.option3, pct: r.opt3count, cls: 'opt3' },
      ];

      const barsHtml = bars.map(b => `
        <div class="result-bar-row">
          <div class="result-bar-label" title="${escHtml(b.label)}">${escHtml(b.label)}</div>
          <div class="result-bar-wrap">
            <div class="result-bar-fill ${b.cls}" style="width:${b.pct}%"></div>
          </div>
          <div class="result-bar-pct">${b.pct}%</div>
        </div>`).join('');

      return `
        <div class="result-item">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <span class="badge badge-purple">Q${i + 1}</span>
            <div class="result-question" style="margin:0;">${escHtml(r.question)}</div>
          </div>
          ${barsHtml}
        </div>`;
    }).join('');
  }

  render();
</script>
</body>
</html>
